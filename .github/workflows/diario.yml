name: Organizar Gmail diario

on:
  schedule:
    # 01:00 UTC = 22:00 ARG (UTC-3). GitHub puede retrasarlo unos minutos.
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      label_only:
        description: 'Solo etiquetar, sin archivar ni mandar a Papelera'
        type: boolean
        default: false
      full:
        description: 'Procesar toda la casilla (no solo lo nuevo)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: gmail-organizer
  cancel-in-progress: false

jobs:
  organizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Cachear estado (senders.json y state.json)
        uses: actions/cache@v4
        with:
          path: |
            senders.json
            state.json
          key: organizer-state-${{ github.run_id }}
          restore-keys: |
            organizer-state-

      - name: Restaurar credenciales OAuth desde secrets
        env:
          GMAIL_CREDENTIALS_B64: ${{ secrets.GMAIL_CREDENTIALS_B64 }}
          GMAIL_TOKEN_B64: ${{ secrets.GMAIL_TOKEN_B64 }}
        run: |
          set -e
          if [ -z "$GMAIL_CREDENTIALS_B64" ] || [ -z "$GMAIL_TOKEN_B64" ]; then
            echo "Faltan secrets GMAIL_CREDENTIALS_B64 y/o GMAIL_TOKEN_B64." >&2
            exit 1
          fi
          write_secret () {
            name="$1"; val="$2"; out="$3"
            # quitar solo CR de Windows; conservar el resto
            norm="$(printf '%s' "$val" | tr -d '\r')"
            first="$(printf '%s' "$norm" | tr -d '[:space:]' | cut -c1)"
            if [ "$first" = "{" ]; then
              echo "$name: secret detectado como JSON crudo"
              printf '%s' "$norm" > "$out"
            else
              echo "$name: secret detectado como base64, decodificando"
              printf '%s' "$norm" | tr -d '[:space:]' | base64 -d > "$out" 2>/dev/null \
                || { echo "$name: base64 invalido"; exit 1; }
            fi
            if head -c1 "$out" | grep -q '{'; then
              echo "$name: OK ($(wc -c < "$out") bytes)"
            else
              echo "$name: ERROR, el resultado no es un JSON valido" >&2
              exit 1
            fi
          }
          write_secret credentials "$GMAIL_CREDENTIALS_B64" credentials.json
          write_secret token "$GMAIL_TOKEN_B64" token.json
          chmod 600 credentials.json token.json

      - name: Correr organizador
        run: |
          # Corrida diaria: por defecto procesa solo lo nuevo desde la ultima vez.
          FLAGS="--execute --since-last-run"

          # --- PERIODO DE PRUEBA: la corrida programada (22:00) solo etiqueta. ---
          # Para activar el modo completo (archivar + Papelera), borra la
          # linea marcada con QUITAR-PARA-MODO-COMPLETO.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FLAGS="$FLAGS --label-only"   # QUITAR-PARA-MODO-COMPLETO
          fi

          # Overrides manuales desde el boton "Run workflow":
          if [ "${{ github.event.inputs.full }}" = "true" ]; then
            FLAGS="--execute --full"
          fi
          if [ "${{ github.event.inputs.label_only }}" = "true" ]; then
            FLAGS="$FLAGS --label-only"
          fi

          echo "Ejecutando: gmail_organizer.py $FLAGS"
          python gmail_organizer.py $FLAGS

      - name: Subir token actualizado (por si Google rotó el refresh_token)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-${{ github.run_id }}
          path: token.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Subir logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore
