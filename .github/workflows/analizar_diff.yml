name: Analizar diff entre dos snapshots (aprender que se elimino)

on:
  workflow_dispatch:
    inputs:
      snapshot_a_run_id:
        description: 'Run ID del snapshot A (antes de la limpieza)'
        required: true
        type: string
      snapshot_b_run_id:
        description: 'Run ID del snapshot B (despues de la limpieza)'
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  analizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download snapshot A
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.snapshot_a_run_id }}
          path: snap_a
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: 'snapshot-A-*'

      - name: Download snapshot B
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.snapshot_b_run_id }}
          path: snap_b
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: 'snapshot-B-*'

      - name: List downloaded files
        run: |
          echo "--- snap_a ---"
          find snap_a -type f
          echo "--- snap_b ---"
          find snap_b -type f

      - name: Analizar diff
        run: |
          A=$(find snap_a -name "snapshot.csv" | head -1)
          B=$(find snap_b -name "snapshot.csv" | head -1)
          if [ -z "$A" ] || [ -z "$B" ]; then
            echo "No encontre los CSV en los artifacts." >&2
            exit 1
          fi
          echo "Analizando: A=$A  B=$B"
          python analizar_diff.py "$A" "$B" | tee analizar_diff_output.txt

      - name: Subir reporte
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-analysis-${{ github.run_id }}
          path: analizar_diff_output.txt
          retention-days: 30
